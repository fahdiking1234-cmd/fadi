<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">
    <div id="admin-login" class="max-w-md mx-auto mt-20 p-6 bg-gray-800 rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-yellow-500">VIP Admin Access</h2>
        <input type="password" id="admin-pin-input" placeholder="Enter Master PIN" class="w-full p-3 rounded bg-gray-700 mb-4 border border-gray-600">
        <button onclick="loginAdmin()" class="w-full bg-yellow-600 py-3 rounded font-bold">Login</button>
    </div>

    <div id="admin-dashboard" class="hidden max-w-4xl mx-auto space-y-6">
        <h1 class="text-3xl font-bold border-b border-gray-700 pb-2">Master Controls</h1>
        
        <div class="bg-gray-800 p-4 rounded">
            <h3 class="text-xl mb-4 text-blue-400">Site Identity</h3>
            <input type="text" id="set-site-name" placeholder="Website Name" class="w-full p-2 bg-gray-700 rounded mb-2">
            <input type="text" id="set-logo-url" placeholder="Logo Image URL" class="w-full p-2 bg-gray-700 rounded mb-4">
            <button onclick="saveIdentity()" class="bg-green-600 px-4 py-2 rounded">Save Identity</button>
        </div>

        <div class="bg-gray-800 p-4 rounded">
            <h3 class="text-xl mb-4 text-blue-400">Add New Tool</h3>
            <input type="text" id="tool-name" placeholder="Tool Name" class="w-full p-2 bg-gray-700 rounded mb-2">
            <input type="text" id="tool-url" placeholder="Website URL" class="w-full p-2 bg-gray-700 rounded mb-2">
            <input type="text" id="tool-logo" placeholder="Tool Logo URL" class="w-full p-2 bg-gray-700 rounded mb-4">
            <button onclick="addTool()" class="bg-blue-600 px-4 py-2 rounded">Add Tool</button>
        </div>

        <div class="bg-gray-800 p-4 rounded">
            <h3 class="text-xl mb-4 text-red-400">Security Vault</h3>
            <label class="flex items-center space-x-3 cursor-pointer">
                <span>Lock Website:</span>
                <input type="checkbox" id="lock-toggle" onchange="toggleLock()" class="w-6 h-6">
            </label>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
